<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-agentti</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#0a0e1a; color:#e5e7eb; }
    .wrap { max-width:1100px; margin:0 auto; padding:32px 20px; }
    .panel { background:#111827; border:1px solid #1f2937; border-radius:16px; padding:16px; margin-bottom:16px; }
    textarea, button { width:100%; padding:14px; border-radius:12px; border:1px solid #1f2937; background:#111827; color:#e5e7eb; }
    button { background:#2563eb; color:white; cursor:pointer; margin-top:10px; }
    .answer { white-space:pre-wrap; line-height:1.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Hankinta-agentti</h1>
    <div class="panel">
      <div>Kysy esimerkiksi:</div>
      <ul>
        <li>näytä kaikki it-hankinnat</li>
        <li>etsi maisemasuunnitteluun liittyvät hankinnat</li>
        <li>mitkä ovat uudet hankinnat Helsingissä</li>
        <li>näytä budjetit tai investointipäätökset</li>
      </ul>
    </div>

    <div class="panel">
      <textarea id="question" rows="4" placeholder="Kirjoita kysymys hankinnoista..."></textarea>
      <button id="askBtn">Analysoi</button>
    </div>

    <div class="panel answer" id="answer">Valmis kysymyksille.</div>
  </div>

  <script>
    function fuzzy(query, text) {
      const q = (query || "").toLowerCase();
      const t = (text || "").toLowerCase();
      if (!q) return true;
      if (t.includes(q)) return true;
      let qi = 0;
      for (let i = 0; i < t.length && qi < q.length; i++) {
        if (t[i] === q[qi]) qi++;
      }
      return qi === q.length;
    }

    Promise.all([
      fetch('./data/procurements.json?v=' + Date.now()).then(r => r.json()),
      fetch('./history/2026/procurements-2026.json?v=' + Date.now()).then(r => r.json())
    ]).then(([current, history]) => {
      const answer = document.getElementById('answer');
      const askBtn = document.getElementById('askBtn');
      const question = document.getElementById('question');

      askBtn.onclick = () => {
        const q = (question.value || '').trim().toLowerCase();
        if (!q) {
          answer.textContent = "Kirjoita ensin kysymys.";
          return;
        }

        const base = [...current, ...history];
        const hits = base.filter(item =>
          fuzzy(q, item.search_text || "") ||
          fuzzy(q, item.title || "") ||
          fuzzy(q, (item.matched_keywords || []).join(" ")) ||
          fuzzy(q, item.item_type || "") ||
          fuzzy(q, item.entity || "")
        ).slice(0, 12);

        if (!hits.length) {
          answer.textContent = "En löytänyt osumia. Kokeile lyhyempää hakua tai katkennutta sanaa, kuten 'maiem' tai 'rakenn'.";
          return;
        }

        const byType = {};
        hits.forEach(item => {
          byType[item.item_type || "muu"] = (byType[item.item_type || "muu"] || 0) + 1;
        });

        const summary = [
          `Löysin ${hits.length} osumaa kysymykselle: "${q}"`,
          "",
          "Yhteenveto tyypeittäin:",
          ...Object.entries(byType).map(([k, v]) => `- ${k}: ${v}`),
          "",
          "Parhaat osumat:",
          ...hits.map((item, i) =>
            `${i + 1}. ${item.title}\n   Hankintayksikkö: ${item.entity}\n   Tyyppi: ${item.item_type}\n   CPV: ${item.cpv_primary} ${item.cpv_label}\n   Alue: ${item.area}\n   Linkki: ${item.url}\n`
          )
        ];

        answer.textContent = summary.join("\n");
      };
    });
  </script>
</body>
</html>
