<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>HankintaSeuranta</title>

<style>
body { margin:0; font-family:Arial; background:#0a0e1a; color:#e5e7eb; }
.wrap { max-width:1400px; margin:0 auto; padding:24px; }
.panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:14px; }
.filters { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
input, select, button {
  padding:10px; border-radius:10px;
  border:1px solid #1f2937;
  background:#111827; color:white;
}
button { background:#2563eb; cursor:pointer; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(360px,1fr)); gap:14px; }
.card { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:14px; }
.tag { background:#1f2937; padding:4px 8px; border-radius:999px; font-size:12px; margin:3px; display:inline-block; }
.badge { background:#2563eb; padding:4px 8px; border-radius:999px; font-size:12px; margin-left:6px; }
.hot { background:#dc2626; }
.theme { background:#0f766e; }
.signal { background:#7c3aed; }
.muted { color:#94a3b8; font-size:13px; }
.section-title { font-size:12px; color:#94a3b8; margin-top:10px; margin-bottom:4px; text-transform:uppercase; letter-spacing:.04em; }
.topnav { display:flex; gap:10px; margin:12px 0 20px 0; flex-wrap:wrap; }
.topnav a {
  display:inline-block; padding:10px 14px; background:#2563eb; color:white;
  text-decoration:none; border-radius:10px;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>HankintaSeuranta 🔍</h1>

  <div class="topnav">
    <a href="contracts.html">⏳ Päättyvät sopimukset</a>
    <a href="pipeline.html">📆 Tulevat hankinnat</a>
    <a href="contracts_timeline.html">🧾 Sopimusten vuosikello</a>
    <a href="calendar.html">🗓️ Hankintakalenteri</a>
    <a href="history.html">🗂️ Historia</a>
    <a href="agent.html">🤖 Agentti</a>
  </div>

  <div class="filters panel">
    <input id="q" placeholder="Sanahaku" />
    <input id="cpv" placeholder="CPV-koodi" />
    <input id="cpvSearch" placeholder="CPV sanahaku" />
    <input id="area" placeholder="Alue" />
    <input id="entity" placeholder="Hankintayksikkö" />

    <select id="type">
      <option value="">Kaikki tilat</option>
      <option>budjetti</option>
      <option>investointipäätös</option>
      <option>hankintasuunnitelma</option>
      <option>hankintakalenteritieto</option>
      <option>käynnissä oleva hankinta</option>
      <option>mennyt kilpailutus</option>
      <option>sopimus päättymässä</option>
      <option>muu hankintatieto</option>
    </select>

    <select id="themeFilter">
      <option value="">Kaikki teemat</option>
    </select>

    <select id="signalFilter">
      <option value="">Kaikki signaalit</option>
    </select>

    <input id="fromDate" type="date"/>
    <input id="toDate" type="date"/>

    <label><input type="checkbox" id="newOnly"/> Vain uudet</label>

    <button id="searchBtn">HAE</button>
  </div>

  <div id="debug" class="muted" style="margin-bottom:8px;"></div>
  <div id="count" class="muted" style="margin-bottom:12px;"></div>
  <div id="results" class="grid"></div>
</div>

<script>
function fuzzy(q, t){
  q = (q || "").toLowerCase();
  t = (t || "").toLowerCase();
  if(!q) return true;
  if(t.includes(q)) return true;
  let i = 0;
  for(let c of t){
    if(c === q[i]) i++;
    if(i === q.length) return true;
  }
  return false;
}

function parseDate(d){
  if(!d) return null;
  if(String(d).includes(".")){
    const parts = String(d).split(".");
    if(parts.length === 3){
      const [day, month, year] = parts;
      return new Date(year, month - 1, day);
    }
  }
  const parsed = new Date(d);
  return isNaN(parsed.getTime()) ? null : parsed;
}

function esc(v){
  return String(v || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

fetch('./data/procurements.json?v=' + Date.now())
.then(r => r.json())
.then(data => {
  const q = document.getElementById('q');
  const cpv = document.getElementById('cpv');
  const cpvSearch = document.getElementById('cpvSearch');
  const area = document.getElementById('area');
  const entity = document.getElementById('entity');
  const type = document.getElementById('type');
  const themeFilter = document.getElementById('themeFilter');
  const signalFilter = document.getElementById('signalFilter');
  const fromDate = document.getElementById('fromDate');
  const toDate = document.getElementById('toDate');
  const newOnly = document.getElementById('newOnly');
  const results = document.getElementById('results');
  const count = document.getElementById('count');
  const debug = document.getElementById('debug');
  const searchBtn = document.getElementById('searchBtn');

  const allThemes = [...new Set(
    data.flatMap(item => Array.isArray(item.theme_tags) ? item.theme_tags : [])
      .filter(Boolean)
  )].sort((a, b) => a.localeCompare(b, 'fi'));

  const allSignals = [...new Set(
    data.flatMap(item => Array.isArray(item.signal_tags) ? item.signal_tags : [])
      .filter(Boolean)
  )].sort((a, b) => a.localeCompare(b, 'fi'));

  themeFilter.innerHTML =
    `<option value="">Kaikki teemat</option>` +
    allThemes.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');

  signalFilter.innerHTML =
    `<option value="">Kaikki signaalit</option>` +
    allSignals.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('');

  debug.innerHTML = `Teemoja: <b>${allThemes.length}</b> · Signaaleja: <b>${allSignals.length}</b>`;

  function score(item){
    let s = 0;
    if(item.is_new) s += 5;
    if(item.cpv_primary) s += 3;
    if(item.document_url) s += 2;
    if((item.matched_keywords || []).length) s += (item.matched_keywords || []).length;
    if((item.theme_tags || []).length) s += (item.theme_tags || []).length * 2;
    if((item.signal_tags || []).length) s += (item.signal_tags || []).length * 3;
    if((item.item_type || "").toLowerCase().includes("sopimus")) s += 3;
    if(item.estimated_budget_value) s += 3;
    return s;
  }

  function renderTags(items, cls){
    return (items || []).map(t => `<span class="tag ${cls}">${esc(t)}</span>`).join("");
  }

  function search(){
    const filtered = data.filter(item => {
      const text = item.search_text || "";

      if(q.value && !fuzzy(q.value, text)) return false;
      if(cpv.value && !(item.cpv_primary || "").includes(cpv.value)) return false;

      if(cpvSearch.value){
        const cpvText = `${item.cpv_label || ""} ${text}`;
        if(!fuzzy(cpvSearch.value, cpvText)) return false;
      }

      if(area.value && !(item.area || "").toLowerCase().includes(area.value.toLowerCase())) return false;
      if(entity.value && !(item.entity || "").toLowerCase().includes(entity.value.toLowerCase())) return false;
      if(type.value && item.item_type !== type.value) return false;
      if(themeFilter.value && !(Array.isArray(item.theme_tags) ? item.theme_tags : []).includes(themeFilter.value)) return false;
      if(signalFilter.value && !(Array.isArray(item.signal_tags) ? item.signal_tags : []).includes(signalFilter.value)) return false;
      if(newOnly.checked && !item.is_new) return false;

      const d = parseDate(item.published_at || item.found_at);
      const fromD = parseDate(fromDate.value);
      const toD = parseDate(toDate.value);

      if(fromD && d && d < fromD) return false;
      if(toD && d && d > toD) return false;
      if((fromD || toD) && !d) return false;

      return true;
    }).sort((a, b) => score(b) - score(a));

    count.innerHTML = `<b>${filtered.length}</b> tulosta`;

    results.innerHTML = filtered.map(item => `
      <div class="card">
        <div>
          <b>${esc(item.entity)}</b>
          ${item.is_new ? '<span class="badge">UUSI</span>' : ''}
          ${score(item) > 10 ? '<span class="badge hot">TOP</span>' : ''}
        </div>

        <div style="font-weight:bold;margin:8px 0;">${esc(item.title)}</div>

        <div>
          ${item.item_type ? `<span class="tag">${esc(item.item_type)}</span>` : ''}
          ${(item.cpv_primary || item.cpv_label) ? `<span class="tag">${esc(item.cpv_primary)} ${esc(item.cpv_label || "")}</span>` : ''}
          ${item.contract_end_date ? `<span class="tag signal">Päättyy ${esc(item.contract_end_date)}</span>` : ''}
          ${item.deadline_at ? `<span class="tag">Määräaika ${esc(item.deadline_at)}</span>` : ''}
        </div>

        ${item.estimated_budget_value ? `
          <div class="muted" style="margin-top:8px;">Arvioitu budjetoitu arvo: <b>${esc(item.estimated_budget_value)}</b></div>
        ` : ''}

        <div class="muted" style="margin-top:8px;">
          ${esc(item.area)} · ${esc(item.published_at || item.found_at)}
        </div>

        ${(item.theme_tags || []).length ? `
          <div class="section-title">Teemat</div>
          <div>${renderTags(item.theme_tags, "theme")}</div>
        ` : ''}

        ${(item.signal_tags || []).length ? `
          <div class="section-title">Signaalit</div>
          <div>${renderTags(item.signal_tags, "signal")}</div>
        ` : ''}

        <div style="margin-top:12px;">
          <a href="detail.html?id=${encodeURIComponent(item.id || item.url)}">Avaa tiedot</a>
        </div>
      </div>
    `).join("");
  }

  searchBtn.onclick = search;
  search();
});
</script>
</body>
</html>
