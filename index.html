<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HankintaSeuranta v7</title>

<style>
body { margin:0; font-family:Arial; background:#0a0e1a; color:#e5e7eb; }
.wrap { max-width:1400px; margin:0 auto; padding:24px; }
.panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:14px; }
.filters { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
input, select { padding:10px; border-radius:10px; border:1px solid #1f2937; background:#111827; color:white; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(350px,1fr)); gap:14px; }
.card { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:14px; }
.tag { background:#1f2937; padding:4px 8px; border-radius:999px; font-size:12px; margin:3px; display:inline-block;}
.badge { background:#2563eb; padding:4px 8px; border-radius:999px; font-size:12px; margin-left:6px;}
.hot { background:#dc2626; }
</style>
</head>

<body>
<div class="wrap">
  <h1>HankintaSeuranta v7 🔍</h1>

  <div class="filters panel">

    <!-- 🔍 Tekstihaku -->
    <input id="q" placeholder="Sanahaku (myös katkennut: maiem)" />

    <!-- CPV -->
    <input id="cpv" placeholder="CPV-koodi (esim. 714)" />

    <!-- Sijainti -->
    <input id="area" placeholder="Alue (Uusimaa, Pirkanmaa...)" />

    <!-- Hankintayksikkö -->
    <input id="entity" placeholder="Hankintayksikkö" />

    <!-- Tyyppi -->
    <select id="type">
      <option value="">Kaikki tilat</option>
      <option>budjetti</option>
      <option>investointipäätös</option>
      <option>hankintasuunnitelma</option>
      <option>hankintakalenteritieto</option>
      <option>käynnissä oleva hankinta</option>
      <option>mennyt kilpailutus</option>
    </select>

    <!-- Päivämäärä -->
    <input id="fromDate" type="date"/>
    <input id="toDate" type="date"/>

    <!-- Uudet -->
    <label><input type="checkbox" id="newOnly"/> Vain uudet</label>

  </div>

  <div id="count"></div>
  <div id="results" class="grid"></div>
</div>

<script>
function fuzzy(q, t){
  q=q.toLowerCase(); t=t.toLowerCase();
  if(!q) return true;
  if(t.includes(q)) return true;
  let i=0;
  for(let c of t){ if(c===q[i]) i++; if(i===q.length) return true;}
  return false;
}

function parseDate(d){
  if(!d) return null;
  return new Date(d);
}

fetch('./data/procurements.json?v='+Date.now())
.then(r=>r.json())
.then(data=>{

const q=document.getElementById('q');
const cpv=document.getElementById('cpv');
const area=document.getElementById('area');
const entity=document.getElementById('entity');
const type=document.getElementById('type');
const fromDate=document.getElementById('fromDate');
const toDate=document.getElementById('toDate');
const newOnly=document.getElementById('newOnly');
const results=document.getElementById('results');
const count=document.getElementById('count');

function score(item){
  let s=0;
  if(item.is_new) s+=5;
  if(item.cpv_primary) s+=3;
  if(item.document_url) s+=2;
  if((item.matched_keywords||[]).length) s+=item.matched_keywords.length;
  return s;
}

function draw(){

const filtered = data.filter(item=>{

  const text = item.search_text || "";

  // 🔍 tekstihaku
  if(q.value && !fuzzy(q.value,text)) return false;

  // CPV
  if(cpv.value && !(item.cpv_primary||"").includes(cpv.value)) return false;

  // alue
  if(area.value && !(item.area||"").toLowerCase().includes(area.value.toLowerCase())) return false;

  // hankintayksikkö
  if(entity.value && !(item.entity||"").toLowerCase().includes(entity.value.toLowerCase())) return false;

  // tyyppi
  if(type.value && item.item_type!==type.value) return false;

  // uusi
  if(newOnly.checked && !item.is_new) return false;

  // päivämäärä
  const d = parseDate(item.published_at || item.found_at);
  if(fromDate.value && d < parseDate(fromDate.value)) return false;
  if(toDate.value && d > parseDate(toDate.value)) return false;

  return true;
})
.sort((a,b)=>score(b)-score(a));

count.innerHTML = `<b>${filtered.length}</b> tulosta`;

results.innerHTML = filtered.map(item=>`
<div class="card">
  <div><b>${item.entity}</b> 
    ${item.is_new ? '<span class="badge">UUSI</span>' : ''}
    ${score(item)>8 ? '<span class="badge hot">TOP</span>' : ''}
  </div>

  <div style="font-weight:bold;margin:6px 0;">${item.title}</div>

  <div>
    <span class="tag">${item.item_type}</span>
    <span class="tag">${item.cpv_primary} ${item.cpv_label||""}</span>
  </div>

  <div style="font-size:13px;color:#94a3b8;margin-top:6px;">
    ${item.area} · ${item.published_at}
  </div>

  <div style="margin-top:8px;">
    ${(item.matched_keywords||[]).map(t=>`<span class="tag">${t}</span>`).join("")}
  </div>

  <div style="margin-top:10px;">
    <a href="${item.url}" target="_blank">Avaa</a>
    ${item.document_url ? ` | <a href="${item.document_url}" target="_blank">PDF</a>` : ''}
  </div>
</div>
`).join("");

}

[q,cpv,area,entity,type,fromDate,toDate,newOnly]
.forEach(el=>el.addEventListener("input",draw));

draw();
});
</script>
</body>
</html>
