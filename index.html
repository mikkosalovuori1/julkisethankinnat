<script>
fetch('./data/procurements.json?v=' + Date.now())
  .then(res => res.json())
  .then(data => {
    const root = document.getElementById('root') || document.body;

    const safe = (v) => String(v || '');

    root.innerHTML = `
      <div style="min-height:100vh; background:#0a0e1a; color:#e5e7eb; font-family:Arial,sans-serif;">
        <div style="max-width:1200px; margin:0 auto; padding:32px 20px;">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:20px; margin-bottom:24px; flex-wrap:wrap;">
            <div>
              <h1 style="margin:0; font-size:32px;">HankintaSeuranta</h1>
              <div style="color:#94a3b8; margin-top:6px;">Julkisten hankintojen päivittäinen seuranta</div>
            </div>
            <div style="background:#111827; border:1px solid #1f2937; padding:14px 18px; border-radius:14px;">
              <div style="font-size:13px; color:#94a3b8;">Löytyi</div>
              <div style="font-size:28px; font-weight:700;">${data.length}</div>
            </div>
          </div>

          <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:16px;">
            ${data.map(item => `
              <div style="background:#111827; border:1px solid #1f2937; border-radius:16px; padding:18px; box-shadow:0 8px 24px rgba(0,0,0,0.25);">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:10px;">
                  <div style="font-size:14px; color:#93c5fd; font-weight:600;">
                    ${safe(item.entity)}
                  </div>
                  ${item.is_new ? `<span style="background:#1d4ed8; color:white; font-size:12px; padding:4px 8px; border-radius:999px;">UUSI</span>` : ''}
                </div>

                <div style="font-size:18px; font-weight:700; line-height:1.35; margin-bottom:10px;">
                  ${safe(item.title)}
                </div>

                ${item.source_page ? `
                  <div style="font-size:13px; color:#94a3b8; margin-bottom:10px;">
                    Lähdesivu: ${safe(item.source_page)}
                  </div>
                ` : ''}

                <div style="font-size:12px; color:#64748b; margin-bottom:14px;">
                  ${safe(item.found_at)}
                </div>

                <a href="${safe(item.url)}" target="_blank" rel="noopener noreferrer"
                  style="display:inline-block; background:#2563eb; color:white; text-decoration:none; padding:10px 14px; border-radius:10px; font-weight:600;">
                  Avaa linkki
                </a>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  })
  .catch(err => {
    console.error(err);
    const root = document.getElementById('root') || document.body;
    root.innerHTML = `
      <div style="padding:40px; background:#0a0e1a; color:white; font-family:Arial,sans-serif;">
        Datan lataus epäonnistui.
      </div>
    `;
  });
</script>
