<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HankintaSeuranta</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0e1a;
      color: #e5e7eb;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .stat {
      background: #111827;
      border: 1px solid #1f2937;
      padding: 14px 18px;
      border-radius: 14px;
    }
    .stat-label {
      font-size: 13px;
      color: #94a3b8;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      margin-top: 4px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }
    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .entity {
      font-size: 14px;
      color: #93c5fd;
      font-weight: 600;
    }
    .badge {
      background: #1d4ed8;
      color: white;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 10px;
    }
    .meta {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 10px;
      word-break: break-word;
    }
    .time {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 14px;
    }
    .btn {
      display: inline-block;
      background: #2563eb;
      color: white;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
    }
    .error {
      padding: 40px;
      color: white;
    }
  </style>
</head>
<body>
  <div id="app" class="wrap">
    <div class="error">Ladataan dataa...</div>
  </div>

  <script>
    function safe(v) {
      return String(v || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    fetch('./data/procurements.json?v=' + Date.now())
      .then(res => {
        if (!res.ok) throw new Error('JSON-lataus epäonnistui');
        return res.json();
      })
      .then(data => {
        const app = document.getElementById('app');

        app.innerHTML = `
          <div class="top">
            <div>
              <h1 style="margin:0; font-size:32px;">HankintaSeuranta</h1>
              <div style="color:#94a3b8; margin-top:6px;">
                Julkisten hankintojen päivittäinen seuranta
              </div>
            </div>
            <div class="stat">
              <div class="stat-label">Löytyi</div>
              <div class="stat-value">${data.length}</div>
            </div>
          </div>

          <div class="grid">
            ${data.map(item => `
              <div class="card">
                <div class="card-top">
                  <div class="entity">${safe(item.entity)}</div>
                  ${item.is_new ? '<span class="badge">UUSI</span>' : ''}
                </div>

                <div class="title">${safe(item.title)}</div>

                ${item.source_page ? `
                  <div class="meta">Lähdesivu: ${safe(item.source_page)}</div>
                ` : ''}

                <div class="time">${safe(item.found_at)}</div>

                <a class="btn" href="${safe(item.url)}" target="_blank" rel="noopener noreferrer">
                  Avaa linkki
                </a>
              </div>
            `).join('')}
          </div>
        `;
      })
      .catch(err => {
        console.error(err);
        document.getElementById('app').innerHTML = `
          <div class="error">
            Datan lataus epäonnistui. Tarkista että tiedosto <b>data/procurements.json</b> löytyy.
          </div>
        `;
      });
  </script>
</body>
</html>
