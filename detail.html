<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hankinta</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="page">
  <a href="index.html">← takaisin</a>
  <div id="app">Ladataan...</div>
</div>

<script src="ui.js"></script>
<script>

function getId() {
  return new URL(location.href).searchParams.get("id");
}

loadProcurementData().then(data => {

  const id = getId();
  const item = data.find(x => x.id === id || x.url === id);

  if (!item) {
    document.getElementById("app").innerHTML = "Ei löytynyt";
    return;
  }

  document.getElementById("app").innerHTML = `
    <h1>${item.title}</h1>

    <p><b>Organisaatio:</b> ${item.entity}</p>
    <p><b>Alue:</b> ${item.area || "-"}</p>
    <p><b>Tyyppi:</b> ${item.item_type || "-"}</p>
    <p><b>Arvo:</b> ${item.estimated_budget_value || "-"}</p>
    <p><b>Määräaika:</b> ${item.deadline_at || "-"}</p>

    <h3>Teksti</h3>
    <pre style="white-space:pre-wrap;">${item.pdf_text || ""}</pre>

    ${item.document_url ? `<p><a href="${item.document_url}" target="_blank">Avaa liite</a></p>` : ""}
  `;

});

</script>
</body>
</html>
